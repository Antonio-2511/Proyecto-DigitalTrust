<header th:fragment="header" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <nav class="navbar"> <div class="nav-left">
        <a th:href="@{/}" class="logo">
            <img th:src="@{/images/digitalTrust_logo.png}"
                 src="/images/digitalTrust_logo.png"
                 alt="DigitalTrust Logo">
        </a>        <ul class="nav-links">        <ul class="nav-links">
            <li><a th:href="@{/}" th:text="#{navbar.home}">Inicio</a></li>
            <li><a th:href="@{/planes}" th:text="#{navbar.planes}">Planes</a></li>
            <li><a th:href="@{/reportes}" th:text="#{navbar.reportes}">Reportes</a></li>
            <li><a th:href="@{/advertencias}" th:text="#{navbar.advertencias}">Advertencias</a></li>
            <li><a th:href="@{/detector-mensajes-sospechosos}" th:text="#{navbar.mensajes}">Mensajes</a></li>
            <li><a th:href="@{/contacto}" th:text="#{navbar.contacto}">Contacto</a></li>
        </ul>
    </div>

        <div class="nav-right">
            <a th:href="@{/carrito}" class="nav-icon">🛒</a>
            <a th:href="@{/buscar}" class="nav-icon">🔍</a>

            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="nav-icon">👤</a>
            </div>

            <div sec:authorize="isAuthenticated()" style="display:flex; align-items:center; gap:10px;">
                <span sec:authentication="name" style="font-size: 0.8rem; font-weight: bold;"></span>
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn" style="padding: 5px 15px; font-size: 12px;">Salir</button>
                </form>
            </div>

            <div class="lang-switch" style="font-size: 14px; font-weight: bold;">
                <a th:href="@{/(lang='es')}" style="color:white; text-decoration:none;">ES</a> |
                <a th:href="@{/(lang='en')}" style="color:white; text-decoration:none;">EN</a>
            </div>
        </div>
    </nav>
</header>
