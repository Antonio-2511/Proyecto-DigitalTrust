<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membresía - Alixar Seguros</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        /* Estilos específicos para la cuadrícula de planes (puedes moverlos a style.css luego) */
        .pricing-grid {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .plan-card {
            background: white;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            padding: 30px;
            width: 300px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .plan-card.featured {
            border: 2px solid #22c1a5;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(34, 193, 165, 0.2);
        }

        .badge {
            background-color: #22c1a5;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
        }

        .plan-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #1a365d;
        }

        .plan-price {
            font-size: 2.5rem;
            font-weight: bold;
            color: #22c1a5;
            margin-bottom: 20px;
        }

        .plan-price span {
            font-size: 1rem;
            color: #718096;
        }

        .plan-features {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
            text-align: left;
            flex-grow: 1;
        }

        .plan-features li {
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #4a5568;
        }

        .plan-features li::before {
            content: "✓";
            color: #22c1a5;
            margin-right: 10px;
            font-weight: bold;
        }

        /* Reutilizamos tu clase .btn del style.css pero la ajustamos al plan */
        .btn-full {
            width: 100%;
            display: inline-block;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 class="page-title" th:text="#{membresia.titulo}"></h1>
        <p th:text="#{membresia.subtitulo}"></p>
    </div>

    <div class="pricing-grid">
        <div class="plan-card">
            <div class="plan-name" th:text="#{plan.basico}"></div>
            <div class="plan-price">5.99€<span th:text="#{plan.mes}"></span></div>
            <a th:href="@{/comprar/basico}" class="btn" style="width:100%; display:block; box-sizing:border-box;" th:text="#{plan.btn.seleccionar}"></a>
        </div>

        <div class="plan-card featured">
            <div class="badge" th:text="#{plan.recomendado}"></div>
            <div class="plan-name" th:text="#{plan.premium}"></div>
            <div class="plan-price">9.99€<span th:text="#{plan.mes}"></span></div>
            <a th:href="@{/comprar/premium}" class="btn" style="width:100%; display:block; box-sizing:border-box; background:#22c1a5;" th:text="#{plan.btn.mejorar}"></a>
        </div>

        <div class="plan-card">
            <div class="plan-name" th:text="#{plan.empresa}"></div>
            <div class="plan-price">29.99€<span th:text="#{plan.mes}"></span></div>
            <a th:href="@{/contacto}" class="btn" style="width:100%; display:block; box-sizing:border-box; background:#95a5a6;" th:text="#{plan.btn.ventas}"></a>
        </div>
    </div>
</main>
</body>
</html>
