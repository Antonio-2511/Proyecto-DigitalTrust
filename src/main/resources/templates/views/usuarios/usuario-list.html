<table xmlns:th="http://www.w3.org/1999/xhtml">

    <tr>
        <th>Email</th>
        <th>Acciones</th>
    </tr>
    <tr th:each="u : ${page.content}">

        <td th:text="${u.email}"></td>
        <td>
            <a th:href="@{/usuarios/detail(username=${u.username})}">
                Ver
            </a>
            <a th:href="@{/usuarios/edit(username=${u.username})}">
                Editar
            </a>
            <form th:action="@{/usuarios/delete}" method="post">
                <input type="hidden" name="username" th:value="${u.username}">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
</table>
