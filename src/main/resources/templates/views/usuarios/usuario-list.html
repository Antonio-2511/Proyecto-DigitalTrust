<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Usuarios')"></head>

<body>

<header th:replace="fragments/header :: header"></header>

<main class="container">

    <h1 class="page-title" th:text="#{users.title}"></h1>

    <table class="table">

        <thead>
        <tr>
            <th th:text="#{users.email}"></th>
            <th th:text="#{users.actions}"></th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${page.content}">

            <td th:text="${u.email}"></td>

            <td class="actions">

                <a class="btn btn-view"
                   th:href="@{/usuarios/detail(username=${u.username})}"
                   th:text="#{users.view}">
                </a>

                <a class="btn btn-edit"
                   th:href="@{/usuarios/edit(username=${u.username})}"
                   th:text="#{users.edit}">
                </a>

                <form th:action="@{/usuarios/delete}" method="post" style="display:inline">
                    <input type="hidden" name="username" th:value="${u.username}">
                    <button class="btn btn-delete" type="submit"
                            th:text="#{users.delete}">
                    </button>
                </form>

            </td>

        </tr>
        </tbody>

    </table>

</main>

<footer th:replace="fragments/footer :: footer"></footer>

</body>
</html>
