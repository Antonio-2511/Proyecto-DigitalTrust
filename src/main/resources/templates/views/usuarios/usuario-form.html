<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Usuario')"></head>

<body>

<header th:replace="fragments/header :: header"></header>

<main class="container">

    <h1 class="page-title"
        th:text="${modo == 'crear'} ? 'Crear Usuario' : 'Editar Usuario'">
    </h1>

    <form class="form-card"
          th:action="${modo == 'crear'} ? @{/usuarios/insert} : @{/usuarios/update}"
          th:object="${usuario}"
          method="post">

        <div th:if="${#fields.hasErrors('*')}" class="error-box">
            <ul>
                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
            </ul>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}">
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" th:field="*{telefono}">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}">
        </div>

        <div class="form-group">
            <label>Confirmar Password</label>
            <input type="password" th:field="*{confirmPassword}">
        </div>

        <div class="form-group">
            <label>Plan</label>

            <select th:field="*{planId}">
                <option value="">Selecciona plan</option>

                <option th:each="p : ${planes}"
                        th:value="${p.nombrePlan}"
                        th:text="${p.nombrePlan}">
                </option>

            </select>

        </div>

        <div class="form-actions">

            <button class="btn btn-primary" type="submit">
                Guardar
            </button>

            <a class="btn btn-secondary" th:href="@{/usuarios}">
                Cancelar
            </a>

        </div>

    </form>

</main>

<footer th:replace="fragments/footer :: footer"></footer>

</body>
</html>
