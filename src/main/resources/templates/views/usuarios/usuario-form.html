<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Usuario')"></head>

<body>

<header th:replace="fragments/header :: header"></header>

<main class="container">

    <h1 class="page-title"
        th:text="${modo == 'crear'} ? #{users.create} : #{users.editTitle}">
    </h1>

    <form class="form-card"
          th:action="${modo == 'crear'} ? @{/usuarios/insert} : @{/usuarios/update}"
          th:object="${usuario}"
          method="post">

        <div th:if="${#fields.hasErrors('*')}" class="error-box">
            <ul>
                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
            </ul>
        </div>

        <div class="form-group">
            <label th:text="#{users.username}"></label>
            <input type="text" th:field="*{username}">
        </div>

        <div class="form-group">
            <label th:text="#{users.email}"></label>
            <input type="email" th:field="*{email}">
        </div>

        <div class="form-group">
            <label th:text="#{users.phone}"></label>
            <input type="text" th:field="*{telefono}">
        </div>

        <div class="form-group">
            <label th:text="#{users.password}"></label>
            <input type="password" th:field="*{password}">
        </div>

        <div class="form-group">
            <label th:text="#{users.confirmPassword}"></label>
            <input type="password" th:field="*{confirmPassword}">
        </div>

        <div class="form-group">
            <label th:text="#{users.plan}"></label>

            <select th:field="*{planId}">
                <option value="" th:text="#{users.selectPlan}"></option>

                <option th:each="p : ${planes}"
                        th:value="${p.nombrePlan}"
                        th:text="${p.nombrePlan}">
                </option>

            </select>

        </div>

        <div class="form-actions">

            <button class="btn btn-primary" type="submit"
                    th:text="#{common.save}">
            </button>

            <a class="btn btn-secondary"
               th:href="@{/usuarios}"
               th:text="#{common.cancel}">
            </a>

        </div>

    </form>

</main>

<footer th:replace="fragments/footer :: footer"></footer>

</body>
</html>
