<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Alixar Seguros</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        /* Ajustes específicos para centrar el formulario de contacto */
        .contact-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .contact-info {
            max-width: 400px;
        }

        .info-item {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-icon {
            font-size: 24px;
            color: #22c1a5;
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <h1 class="page-title" style="text-align: center;" th:text="#{contacto.titulo}"></h1>
    <p style="text-align: center; color: #666; margin-bottom: 40px;" th:text="#{contacto.subtitulo}"></p>

    <div style="display: flex; justify-content: center;">
        <div class="form-card">
            <form th:action="@{/contacto/enviar}" method="post">
                <div class="form-group">
                    <label th:text="#{contacto.label.nombre}"></label>
                    <input type="text" name="nombre" required>
                </div>
                <div class="form-group">
                    <label th:text="#{contacto.label.email}"></label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label th:text="#{contacto.label.mensaje}"></label>
                    <textarea name="mensaje" rows="5" style="width:100%; border:1px solid #ccc; border-radius:4px;"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="#{contacto.btn.enviar}"></button>
                    <a th:href="@{/}" class="btn btn-secondary" th:text="#{common.cancel}"></a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
