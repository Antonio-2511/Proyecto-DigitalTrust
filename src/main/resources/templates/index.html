<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Inicio')}"></head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<section class="hero">

    <h1 th:text="#{home.title}"></h1>

    <img th:src="@{/images/security.png}" class="hero-img">

    <h3 th:text="#{home.subtitle}"></h3>

</section>

<section class="reviews">

    <div class="review">
        ⭐⭐⭐⭐⭐
        <p th:text="#{home.review}"></p>
    </div>

    <div class="review">
        ⭐⭐⭐⭐⭐
        <p th:text="#{home.review}"></p>
    </div>

    <div class="review">
        ⭐⭐⭐⭐⭐
        <p th:text="#{home.review}"></p>
    </div>

</section>

<section class="info">

    <p th:text="#{home.cta}"></p>

    <button class="btn" th:text="#{home.button}"></button>

</section>

<section class="products">

    <h2 th:text="#{home.products.title}"></h2>

    <div class="product-grid">

        <div class="product">
            <img th:src="@{/images/web.png}">
            <p th:text="#{home.product1}"></p>
            <span>23.99€</span>
        </div>

        <div class="product">
            <img th:src="@{/images/ad.png}">
            <p th:text="#{home.product2}"></p>
            <span>39.99€</span>
        </div>

        <div class="product">
            <img th:src="@{/images/mobile.png}">
            <p th:text="#{home.product3}"></p>
            <span>29.99€</span>
        </div>

    </div>

</section>


<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
