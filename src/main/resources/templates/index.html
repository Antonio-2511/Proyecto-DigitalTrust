<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Inicio')}"></head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<section class="hero">

    <h1 th:text="#{home.title}"></h1>

    <img th:src="@{/images/Banner-Principal.png}"
         src="/images/Banner-Principal.png"
         alt="Seguridad Digital"
         class="hero-img">

    <h3 th:text="#{home.subtitle}"></h3>

</section>

<section class="reviews">

    <!-- Review 1 -->
    <div class="review">
        <img th:src="@{/images/avatar-perfil.png}"
             src="/images/avatar-perfil.png"
             alt="Usuario"
             class="review-img">

        ⭐⭐⭐⭐⭐
        <p th:text="#{home.review}"></p>
    </div>

    <!-- Review 2 -->
    <div class="review">
        <img th:src="@{/images/avatar-perfil-1.png}"
             src="/images/avatar-perfil-1.png"
             alt="Usuario"
             class="review-img">

        ⭐⭐⭐⭐⭐
        <p th:text="#{home.review}"></p>
    </div>

    <!-- Review 3 -->
    <div class="review">
        <img th:src="@{/images/avatar-perfil-2.png}"
             src="/images/avatar-perfil-2.png"
             alt="Usuario"
             class="review-img">

        ⭐⭐⭐⭐⭐
        <p th:text="#{home.review}"></p>
    </div>

</section>

<section class="info">

    <p th:text="#{home.cta}"></p>

    <button class="btn" th:text="#{home.button}"></button>

</section>

<section class="products">

    <h2 th:text="#{home.products.title}"></h2>

    <div class="product-grid">

        <div class="product">
            <img th:src="@{/images/analisis_enlaces.png}"
                 src="/images/analisis_enlaces.png"
                 alt="Análisis de sitios web">
            <p th:text="#{home.product1}"></p>
            <span>23.99€</span>
        </div>

        <div class="product">
            <img th:src="@{/images/escaneo_ads.png}"
                 src="/images/escaneo_ads.png"
                 alt="Escaneo de anuncios">
            <p th:text="#{home.product2}"></p>
            <span>39.99€</span>
        </div>

        <div class="product">
            <img th:src="@{/images/verificacion_llamadas.png}"
                 src="/images/verficacion_llamadas.png"
                 alt="Verificación de apps móviles">
            <p th:text="#{home.product3}"></p>
            <span>29.99€</span>
        </div>

    </div>

</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
